{{ define "main" }}
<div class="container">
    <div class="resume">
        <div class="resume-header">
            <h1>Marco Morfin</h1>
            <p class="resume-title">
                Entertainment Business &middot; Community Management &middot; Esports Operations
            </p>
            <div class="resume-contact">
                <span>Los Angeles, CA</span>
                <span>&middot;</span>
                <span>(909) 441-6903</span>
                <span>&middot;</span>
                <a href="mailto:m.m0rfiin@gmail.com">m.m0rfiin@gmail.com</a>
                <span>&middot;</span>
                <a href="https://www.linkedin.com/in/marco-morfin/" target="_blank">LinkedIn</a>
                <span>&middot;</span>
                <a href="{{ "/" | relURL }}">Portfolio</a>
            </div>
            <div class="resume-download">
                <a
                    href="{{ "resume/Marco-Morfin-Resume.pdf" | relURL }}"
                    class="download-btn"
                    download
                    >Download PDF</a
                >
            </div>
        </div>

        <div class="content resume-content">{{ .Content }}</div>
    </div>
</div>

<style>
    .resume {
        max-width: 780px;
        margin: 0 auto;
        padding: 2.75rem 2rem 3.5rem;
        background: #fcfcfb;
        border: 1px solid #d7dce2;
        color: #22262c;
    }
    .resume-header {
        border-bottom: 1px solid #d4d9df;
        padding-bottom: 1.85rem;
        margin-bottom: 2.15rem;
    }
    .resume-header h1 {
        margin-top: 0;
        margin-bottom: 0.45rem;
        font-size: 2.85rem;
        letter-spacing: -0.04em;
        color: #161a1f;
    }
    .resume-title {
        color: #5f6975;
        font-family: var(--font-mono);
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.09em;
        margin-bottom: 0.9rem;
    }
    .resume-contact {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
        align-items: center;
        font-size: 0.92rem;
        color: #616b76;
        margin-bottom: 1.35rem;
    }
    .resume-contact a {
        color: #4f5964;
    }
    .resume-contact a:hover {
        color: #1d232a;
        opacity: 1;
    }
    .resume-download {
        margin-top: 0.2rem;
    }
    .download-btn {
        display: inline-block;
        padding: 0.55rem 1.15rem;
        border: 1px solid #c2c8cf;
        background: #f8f9fb;
        color: #23272d !important;
        font-family: var(--font-mono);
        font-size: 0.74rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .download-btn:hover {
        background: #eceff2;
        border-color: #969ea8;
        color: #13181d !important;
        opacity: 1 !important;
    }
    .resume-content h2 {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #4f5964;
        font-family: var(--font-mono);
        margin-top: 2.45rem;
        margin-bottom: 1rem;
        padding-bottom: 0.55rem;
        border-bottom: 1px solid #d4d9df;
    }
    .resume-content h3 {
        font-size: 1.09rem;
        margin-top: 1.4rem;
        margin-bottom: 0.2rem;
        color: #171c22;
    }
    .resume-content h4 {
        font-size: 0.84rem;
        color: #707983;
        font-weight: 400;
        font-family: var(--font-mono);
        margin-top: 0;
        margin-bottom: 0.8rem;
    }
    .resume-content ul {
        margin-left: 1.2rem;
        margin-bottom: 1.15rem;
    }
    .resume-content li {
        margin-bottom: 0.45rem;
        font-size: 0.96rem;
        line-height: 1.72;
        color: #2d333a;
    }
    .resume-content p {
        font-size: 0.97rem;
        line-height: 1.72;
        margin-bottom: 0.95rem;
        color: #2d333a;
    }
    .resume-content strong {
        color: #171c22;
    }
    @media (max-width: 760px) {
        .resume {
            padding: 2rem 1.1rem 2.75rem;
        }
        .resume-header h1 {
            font-size: 2.35rem;
        }
        .resume-contact {
            gap: 0.35rem;
            font-size: 0.88rem;
        }
        .resume-contact span:nth-child(even) {
            display: none;
        }
    }
</style>
{{ end }}
